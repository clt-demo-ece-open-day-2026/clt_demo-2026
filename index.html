<!DOCTYPE html>
<html>
<head>
    <title>Live Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Existing CSS from previous steps + some new styles */
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        .controls { background: #2c3e50; color: white; padding: 20px; display: flex; justify-content: center; gap: 20px; align-items: center; }
        .game-container { display: flex; justify-content: center; align-items: flex-end; gap: 5px; margin-top: 50px; }
        .tube-frame { width: 20px; height: 500px; background: white; border: 1px solid #ccc; position: relative; overflow: hidden; }
        .liquid { width: 100%; background: #3498db; position: absolute; bottom: 0; transition: height 0.3s; }
        .admin-only { display: none; } /* Hidden by default */
       
        .header-row {
    background: #1a252f;
    padding: 5px 0; /* Minimal vertical padding */
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid #34495e;
}

/* Container for the Tools Row */
.tools-row {
    background: #2c3e50;
    padding: 8px 30px;
    display: flex;
    justify-content: space-between; /* This spreads the groups to the sides */
    align-items: center;
}

.left-tools, .right-tools {
    display: flex;
    align-items: center;
    gap: 15px;
}
/* Reduced Logo Sizes */
.corner-logo {
    height: 45px; /* Small and subtle */
    width: auto;
    flex-shrink: 0;
    /*margin: 0 15px;*/
}

/* Reduced Heading Size */
.mini-heading {
    margin: 0;
    font-size: 30px; /* Compact text */
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Shrinking the Visitor Box */
.visitor-box {
    background: rgba(255,255,255,0.1);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
}
        
        /* Responsive fix: makes heading smaller on phones */
        @media (max-width: 600px) {
            .main-heading {
                font-size: 18px;
                padding: 0 10px;
            }
        }
</style>
</head>
<body>

<div class="header-row">
    <img src="iisc_logo.png" alt="Logo 1" class="corner-logo">
    <h1 class="mini-heading">Everything is Normal !!</h1>
    <img src="ece_logo.png" alt="Logo 2" class="corner-logo">
</div>

<div class="controls tools-row">
    <div class="left-tools">
        <button id="adminBtn" onclick="enableAdmin()">🔑 Login</button>
        <div class="admin-only" id="adminTools">
            <button onclick="handleReset()" style="background:red; color:white; font-size: 11px; padding: 2px 5px;">RESET</button>
            <input type="range" id="scaleSlider" min="0.1" max="10" step="0.1" value="1" oninput="updateScaleInDB(this.value)" style="width: 80px;">
        </div>
    </div>

    <div id="status" style="font-size: 11px; opacity: 0.7;">Viewing Live Mode</div>

    <div class="right-tools">
        <div class="visitor-box">
            👥 Visitors: <span id="totalVisits">0</span>
        </div>
    </div>
</div>

<div class="game-container" id="container"></div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCfEyJjJreYjUPgw3OMZaLfpDvITuHpm3g",
        authDomain: "cltdemo.firebaseapp.com",
        databaseURL: "https://cltdemo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cltdemo",
        storageBucket: "cltdemo.firebasestorage.app",
        messagingSenderId: "630297595230",
        appId: "1:630297595230:web:ab39e6ad5190db859313cf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // --- APP STATE ---
    let isAdmin = false;
    let resetStep = 0; // Added this to track the 3 clicks

    // Initialize UI
    const container = document.getElementById('container');
    for (let i = 8; i <= 48; i++) {
        container.innerHTML += `
            <div class="column">
                <div class="tube-frame"><div class="liquid" id="liq-${i}"></div></div>
                <button class="admin-only" onclick="increment(${i})">+</button>
                <div>${i}</div>
            </div>`;
    }

    // 1. LISTEN FOR LIVE UPDATES
    db.ref('gameState').on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            // If database is empty (after reset), clear all tubes visually
            for (let i = 8; i <= 48; i++) {
                document.getElementById(`liq-${i}`).style.height = "0px";
            }
            return;
        }

        const scale = data.scale || 1;
        document.getElementById('scaleSlider').value = scale;

        for (let i = 8; i <= 48; i++) {
            const val = data.tubes ? (data.tubes[i] || 0) : 0;
            document.getElementById(`liq-${i}`).style.height = (val * scale) + "px";
        }
    });

    // 2. ADMIN ACTIONS
    function increment(id) {
        if (!isAdmin) return;
        db.ref(`gameState/tubes/${id}`).transaction(current => (current || 0) + 10);
    }

    function updateScaleInDB(val) {
        if (!isAdmin) return;
        db.ref('gameState/scale').set(parseFloat(val));
    }

    function enableAdmin() {
        const pass = prompt("Enter Admin Password:");
        if (pass === "6202yadnepoece") { 
            isAdmin = true;
            // Show all admin elements
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('adminBtn').style.display = 'none';
            document.getElementById('status').innerText = "Logged in as Admin";
        } else {
            alert("Wrong password!");
        }
    }
    
    // 3. CORRECTED RESET LOGIC
    function handleReset() {
        // Changed isOwner to isAdmin to match your login variable
        if (!isAdmin) return;

        const messages = [
            "1/3: Reset all tubes for everyone?",
            "2/3: Are you REALLY sure? This wipes the cloud data.",
            "3/3: FINAL WARNING: This cannot be undone. Wipe now?"
        ];

        if (confirm(messages[resetStep])) {
            resetStep++;
            if (resetStep >= 3) {
                // Perform the wipe
                db.ref('gameState').set(null)
                    .then(() => {
                        alert("Database Cleared.");
                        resetStep = 0;
                    })
                    .catch(err => alert("Error: " + err.message));
            } else {
                handleReset(); // Call itself again for the next prompt
            }
        } else {
            resetStep = 0; // Reset counter if they click "Cancel"
        }
    }
// --- VISITOR COUNTER LOGIC ---

// --- PERSISTENT TOTAL VISITS COUNTER ---

// --- UNIQUE VISITOR COUNTER ---

const totalVisitsRef = db.ref('stats/uniqueVisits');

// 1. Check if this specific browser has a "Visited" tag
const hasBeenCounted = localStorage.getItem('hasVisitedBefore');

if (!hasBeenCounted) {
    // 2. If NO tag exists, it's a new unique person! Increment the cloud total.
    totalVisitsRef.transaction((currentValue) => {
        return (currentValue || 0) + 1;
    });

    // 3. Now, leave a tag so we don't count them again on refresh
    localStorage.setItem('hasVisitedBefore', 'true');
}

// 4. Always listen for the count so everyone sees the latest total
totalVisitsRef.on('value', (snapshot) => {
    const total = snapshot.val() || 0;
    document.getElementById('totalVisits').innerText = total.toLocaleString();
});
</script>
</body>
</html>
