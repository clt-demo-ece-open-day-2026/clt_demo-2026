<!DOCTYPE html>
<html>
<head>
    <title>Live Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* Existing CSS from previous steps + some new styles */
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        .controls { background: #2c3e50; color: white; padding: 16px; display: flex; justify-content: center; gap: 16px; align-items: center; }
        .game-container { display: flex; justify-content: center; align-items: flex-end; gap: 2px; margin-top: 50px; }
        .tube-frame { width: 18px; height: 500px; background: white; border: 1px solid #ccc; position: relative; overflow: hidden; }
        .liquid { width: 100%; background: #3498db; position: absolute; bottom: 0; transition: height 0.3s; }
        .admin-only { display: none; } /* Hidden by default */
       

/* Container for the Top Row */
.header-row {
    background: #1a252f;
    width: 100%;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between; 
    align-items: center;
    box-sizing: border-box;
    border-bottom: 1px solid #34495e;
}

/* Give both logo areas the same width to force the center text to stay centered */
.corner-logo {
    height: 50px;
    width: auto;
    flex: 0 0 150px; /* This gives both logos a 'fixed' space of 150px */
    object-fit: contain;
}

/* Ensure the right logo stays on the right of its 150px box */
.corner-logo:last-child {
    text-align: right;
}

.mini-heading {
    margin: 0;
    font-size: 26px;
    color: #ffffff;
    text-transform: uppercase;
    text-align: center; /* This now centers perfectly between the 150px anchors */
    flex: 1; 
    letter-spacing: 2px;
}
.left-group, .right-group {
    display: flex;
    align-items: center;
    flex: 0 0 350px; /* Must match the logo flex-basis above */
}

.right-group { 
    justify-content: flex-end; 
}
#status {
    flex: 1; /* This is the key: it forces the text to take up all middle space */
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    opacity: 0.7;
    margin: 0 20px;
}
.tools-row {
    background: #2c3e50;
    width: 100%;
    padding: 15px 50px; /* Increased padding */
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-sizing: border-box; /* Prevents horizontal scrollbars */
}
.center-status {
    flex: 1;
    text-align: center;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
}
    .column {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 5px;
}
        
        /* Responsive fix: makes heading smaller on phones */
        @media (max-width: 600px) {
            .main-heading {
                font-size: 18px;
                padding: 0 10px;
            }
        }
</style>
</head>
<body>

<div class="header-row">
    <img src="iisc_logo.png" alt="Logo 1" class="corner-logo">
    <h1 class="mini-heading">Everything is Normal !!</h1>
    <img src="ece_logo.png" alt="Logo 2" class="corner-logo">
</div>

<div class="controls tools-row">
    <div class="left-tools">
        <button id="adminBtn" onclick="enableAdmin()">🔑 Login</button>
        <div class="admin-only" id="adminTools">
            <button onclick="handleReset()" style="background:red; color:white; font-size: 18px; padding: 8px 12px;">RESET</button>
            <input type="range" id="scaleSlider" min="0.1" max="10" step="0.1" value="1" oninput="updateScaleInDB(this.value)" style="width: 80px;">
        </div>
    </div>

    <div id="status" style="font-size: 20px; opacity: 0.7;">Live Histogram of your Total</div>

    <div class="right-tools">
    <div class="visitor-box" style="margin-right: 15px;">
        📈 Total number of Experimentors: <span id="totalIncrements" style="font-weight: bold;">0</span>
    </div>

    <div class="visitor-box">
        👥 Website Visitors: <span id="totalVisits">0</span>
    </div>
</div>
</div>

<div class="game-container" id="container"></div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCfEyJjJreYjUPgw3OMZaLfpDvITuHpm3g",
        authDomain: "cltdemo.firebaseapp.com",
        databaseURL: "https://cltdemo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cltdemo",
        storageBucket: "cltdemo.firebasestorage.app",
        messagingSenderId: "630297595230",
        appId: "1:630297595230:web:ab39e6ad5190db859313cf"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let actionHistory = [];

function recordAction(id) {
    actionHistory.push(id);
    // Keep only the last 10 actions to save memory
    if (actionHistory.length > 10) actionHistory.shift();
}
    // --- APP STATE ---
    let isAdmin = false;
    let resetStep = 0; // Added this to track the 3 clicks

    // Initialize UI
const container = document.getElementById('container');
for (let i = 8; i <= 48; i++) {
    container.innerHTML += `
        <div class="column">
            <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">
                <span id="count-${i}">0</span>
            </div>
            
            <div class="tube-frame"><div class="liquid" id="liq-${i}"></div></div>
            
            <button class="admin-only" onclick="increment(${i})">+</button>
            <div>${i}</div>
        </div>`;
}
    
    // 1. LISTEN FOR LIVE UPDATES
    db.ref('gameState').on('value', (snapshot) => {
    const data = snapshot.val();
    if (!data) {
        for (let i = 8; i <= 48; i++) {
            document.getElementById(`liq-${i}`).style.height = "0px";
        }
        document.getElementById('totalIncrements').innerText = "0"; // Reset total
        return;
    }

    const scale = data.scale || 1;
    document.getElementById('scaleSlider').value = scale;

    let sum = 0; // Initialize sum

    for (let i = 8; i <= 48; i++) {
        const val = data.tubes ? (data.tubes[i] || 0) : 0;
        document.getElementById(`liq-${i}`).style.height = (val * scale) + "px";
        
        sum += (val / 10); // Add the click count to the sum
    }

    // Update the total display
    document.getElementById('totalIncrements').innerText = sum;
});

    // 2. ADMIN ACTIONS
    function increment(id) {
        if (!isAdmin) return;
        db.ref(`gameState/tubes/${id}`).transaction(current => (current || 0) + 10);
        recordAction(id); // Save it for undo
    }

    function updateScaleInDB(val) {
        if (!isAdmin) return;
        db.ref('gameState/scale').set(parseFloat(val));
    }

    function enableAdmin() {
        const pass = prompt("Enter Admin Password:");
        if (pass === "6202yadnepoece") { 
            isAdmin = true;
            // Show all admin elements
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('adminBtn').style.display = 'none';
            document.getElementById('status').innerText = "Logged in as Admin";
        } else {
            alert("Wrong password!");
        }
    }
    
    // 3. CORRECTED RESET LOGIC
    function handleReset() {
        // Changed isOwner to isAdmin to match your login variable
        if (!isAdmin) return;

        const messages = [
            "1/3: Reset all tubes for everyone?",
            "2/3: Are you REALLY sure? This wipes the cloud data.",
            "3/3: FINAL WARNING: This cannot be undone. Wipe now?"
        ];

        if (confirm(messages[resetStep])) {
            resetStep++;
            if (resetStep >= 3) {
                // Perform the wipe
                db.ref('gameState').set(null)
                    .then(() => {
                        alert("Database Cleared.");
                        resetStep = 0;
                    })
                    .catch(err => alert("Error: " + err.message));
            } else {
                handleReset(); // Call itself again for the next prompt
            }
        } else {
            resetStep = 0; // Reset counter if they click "Cancel"
        }
    }
    document.addEventListener('keydown', function(event) {
    if (isAdmin && event.ctrlKey && event.key === 'z') {
        event.preventDefault(); // Stop default browser behavior
        
        if (actionHistory.length > 0) {
            const lastTubeId = actionHistory.pop();
            
            // Undo the last +10
            db.ref(`gameState/tubes/${lastTubeId}`).transaction(current => {
                return (current || 10) - 10;
            });
            console.log("Undo successful for tube: " + lastTubeId);
        } else {
            alert("Nothing to undo!");
        }
    }
});
// --- VISITOR COUNTER LOGIC ---

// --- PERSISTENT TOTAL VISITS COUNTER ---

// --- UNIQUE VISITOR COUNTER ---

const totalVisitsRef = db.ref('stats/uniqueVisits');

// 1. Check if this specific browser has a "Visited" tag
const hasBeenCounted = localStorage.getItem('hasVisitedBefore');

if (!hasBeenCounted) {
    // 2. If NO tag exists, it's a new unique person! Increment the cloud total.
    totalVisitsRef.transaction((currentValue) => {
        return (currentValue || 0) + 1;
    });

    // 3. Now, leave a tag so we don't count them again on refresh
    localStorage.setItem('hasVisitedBefore', 'true');
}

// 4. Always listen for the count so everyone sees the latest total
totalVisitsRef.on('value', (snapshot) => {
    const total = snapshot.val() || 0;
    document.getElementById('totalVisits').innerText = total.toLocaleString();
});
</script>
</body>
</html>
